<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Name Check — Cyprus Realty Brandbook</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Space Grotesk', sans-serif; background: #08080c; color: #b0b0b8; padding: 40px 20px; }
  nav { text-align: center; margin-bottom: 32px; font-size: 13px; }
  nav a { color: #555; text-decoration: none; margin: 0 12px; }
  nav a:hover { color: #fff; }
  h1 { text-align: center; font-size: 26px; font-weight: 700; color: #fff; margin-bottom: 6px; }
  .sub { text-align: center; font-size: 13px; color: #555; margin-bottom: 32px; }

  .add-row {
    max-width: 600px; margin: 0 auto 32px; display: flex; gap: 8px;
  }
  .add-row input {
    flex: 1; background: #12121a; border: 1px solid #222; border-radius: 8px;
    padding: 12px 16px; font-size: 14px; color: #fff; font-family: inherit; outline: none;
  }
  .add-row input::placeholder { color: #444; }
  .add-row input:focus { border-color: #84cc16; }
  .add-row button {
    background: #84cc16; color: #0a0f00; padding: 12px 24px; border: none;
    border-radius: 8px; font-weight: 600; font-size: 13px; font-family: inherit; cursor: pointer;
  }

  .names-grid {
    max-width: 900px; margin: 0 auto;
    display: flex; flex-direction: column; gap: 6px;
  }

  .name-row {
    display: grid;
    grid-template-columns: 160px 1fr 1fr 60px;
    gap: 8px;
    align-items: center;
    padding: 10px 16px;
    background: #0e0e14;
    border: 1px solid #1a1a22;
    border-radius: 8px;
    transition: border-color 0.2s;
  }
  .name-row:hover { border-color: #2a2a34; }

  .name-word {
    font-size: 18px; font-weight: 700; color: #fff; letter-spacing: -0.3px;
  }

  .domain-check {
    display: flex; align-items: center; gap: 8px;
  }
  .domain-link {
    font-size: 13px; color: #888; text-decoration: none;
    padding: 4px 10px; background: #16161e; border-radius: 6px;
    border: 1px solid #222; transition: all 0.2s;
    display: inline-flex; align-items: center; gap: 6px;
  }
  .domain-link:hover { color: #fff; border-color: #444; }
  .domain-link .status {
    width: 8px; height: 8px; border-radius: 50%;
    background: #333;
    flex-shrink: 0;
  }
  .domain-link .status.free { background: #22c55e; box-shadow: 0 0 6px #22c55e40; }
  .domain-link .status.parked { background: #facc15; box-shadow: 0 0 6px #facc1540; }
  .domain-link .status.taken { background: #ef4444; box-shadow: 0 0 6px #ef444440; }
  .domain-link .status.checking { background: #3b82f6; animation: pulse 1s infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }

  .domain-link .label { font-size: 10px; color: #555; margin-left: 4px; }

  .remove-btn {
    background: none; border: none; color: #333; font-size: 18px;
    cursor: pointer; padding: 4px 8px; border-radius: 4px;
  }
  .remove-btn:hover { color: #ef4444; background: #ef444410; }

  .legend {
    max-width: 900px; margin: 24px auto 0;
    display: flex; gap: 20px; justify-content: center; font-size: 11px; color: #555;
  }
  .legend-item { display: flex; align-items: center; gap: 6px; }
  .legend-dot { width: 8px; height: 8px; border-radius: 50%; }

  .tip {
    max-width: 600px; margin: 32px auto 0; text-align: center;
    font-size: 12px; color: #444; line-height: 1.6;
  }
  .tip a { color: #84cc16; text-decoration: none; }
</style>
</head>
<body>

<nav>
  <a href="index.html">&larr; Главная</a>
  <a href="lime-mockups.html">Мокапы</a>
</nav>

<h1>Проверка имён и доменов</h1>
<p class="sub">Введи название — клик по домену откроет его для проверки</p>

<div class="add-row">
  <input type="text" id="nameInput" placeholder="Введи название, например: oiko" autofocus>
  <button onclick="addName()">Добавить</button>
</div>

<div class="names-grid" id="grid"></div>

<div class="legend">
  <div class="legend-item"><div class="legend-dot" style="background:#333"></div> Не проверен</div>
  <div class="legend-item"><div class="legend-dot" style="background:#3b82f6"></div> Проверяется</div>
  <div class="legend-item"><div class="legend-dot" style="background:#22c55e"></div> Свободен</div>
  <div class="legend-item"><div class="legend-dot" style="background:#facc15"></div> Припаркован / Продаётся</div>
  <div class="legend-item"><div class="legend-dot" style="background:#ef4444"></div> Занят</div>
</div>

<div class="tip">
  Кликни на домен — откроется в новой вкладке. Проверь сам и кликни статус-кружок чтобы пометить.<br>
  <a href="https://www.namecheap.com/domains/registration/results/?domain=" target="_blank">Namecheap</a> ·
  <a href="https://registry.nic.cy/cy-ui/home" target="_blank">NIC.cy (.com.cy)</a> ·
  <a href="https://www.whois.com/whois/" target="_blank">WHOIS</a>
</div>

<script>
const DEFAULT_NAMES = [
  "oiko", "kastra", "trovare", "plotti", "kasas", "terrano",
  "nestora", "nesto", "mazi", "spoti", "findy", "limon",
  "vivara", "topia", "volta", "propt", "lokos", "realo",
  "zonar", "dwello", "loca", "homio", "imoti"
];

let names = JSON.parse(localStorage.getItem('brandNames') || 'null') || DEFAULT_NAMES;
let statuses = JSON.parse(localStorage.getItem('brandStatuses') || '{}');

function save() {
  localStorage.setItem('brandNames', JSON.stringify(names));
  localStorage.setItem('brandStatuses', JSON.stringify(statuses));
}

function getStatus(domain) {
  return statuses[domain] || 'unknown';
}

function cycleStatus(domain, el) {
  const order = ['unknown', 'free', 'parked', 'taken'];
  const current = getStatus(domain);
  const next = order[(order.indexOf(current) + 1) % order.length];
  statuses[domain] = next;
  save();
  el.className = 'status ' + next;
}

function render() {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  names.forEach((name, i) => {
    const comDomain = name + '.com';
    const cyDomain = name + '.com.cy';
    const comStatus = getStatus(comDomain);
    const cyStatus = getStatus(cyDomain);

    const row = document.createElement('div');
    row.className = 'name-row';
    row.innerHTML = `
      <div class="name-word">${name}</div>
      <div class="domain-check">
        <a href="https://${comDomain}" target="_blank" class="domain-link" title="Открыть ${comDomain}">
          <span class="status ${comStatus}" onclick="event.preventDefault(); cycleStatus('${comDomain}', this)"></span>
          ${comDomain}
        </a>
        <a href="https://www.namecheap.com/domains/registration/results/?domain=${comDomain}" target="_blank" class="domain-link" title="Проверить на Namecheap" style="padding:4px 8px;font-size:11px;color:#555">NC</a>
      </div>
      <div class="domain-check">
        <a href="https://registry.nic.cy/cy-ui/home" target="_blank" class="domain-link" title="Проверить ${cyDomain} на NIC.cy">
          <span class="status ${cyStatus}" onclick="event.preventDefault(); cycleStatus('${cyDomain}', this)"></span>
          ${cyDomain}
        </a>
      </div>
      <button class="remove-btn" onclick="removeName(${i})" title="Удалить">&times;</button>
    `;
    grid.appendChild(row);
  });
}

function addName() {
  const input = document.getElementById('nameInput');
  const name = input.value.trim().toLowerCase().replace(/[^a-z0-9]/g, '');
  if (name && !names.includes(name)) {
    names.unshift(name);
    save();
    render();
  }
  input.value = '';
  input.focus();
}

function removeName(i) {
  const name = names[i];
  delete statuses[name + '.com'];
  delete statuses[name + '.com.cy'];
  names.splice(i, 1);
  save();
  render();
}

document.getElementById('nameInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') addName();
});

render();
</script>

</body>
</html>
